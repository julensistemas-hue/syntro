          - heading "¿Necesito tener conocimientos técnicos para trabajar con vosotros?" [level=3] [ref=e184]
          - paragraph [ref=e185]: "No. Nos encargamos de toda la parte técnica: configuración, integración con tus herramientas actuales y puesta en marcha. Tu equipo solo necesita aprender a usar las soluciones, que es precisamente lo que cubrimos en la formación."
        - generic [ref=e186]:
          - heading "¿Cuánto tarda en implementarse una solución de IA?" [level=3] [ref=e187]
          - paragraph [ref=e188]: Depende de la complejidad. Un chatbot básico o un flujo de automatización puede estar funcionando en 2-3 semanas. Una implementación completa por departamentos puede llevar 2-3 meses. En la propuesta siempre indicamos plazos concretos.
        - generic [ref=e189]:
          - heading "¿Trabajáis con empresas pequeñas o solo con grandes corporaciones?" [level=3] [ref=e190]
          - paragraph [ref=e191]: La mayoría de nuestros clientes son PyMEs de 10 a 150 empleados. Adaptamos la propuesta y la inversión al tamaño real de cada empresa. No tiene sentido instalar un sistema complejo donde no se va a aprovechar.
        - generic [ref=e192]:
          - heading "¿Qué pasa si una herramienta de IA deja de funcionar o queda obsoleta?" [level=3] [ref=e193]
          - paragraph [ref=e194]: El ecosistema IA cambia constantemente. Por eso ofrecemos mantenimiento y revisión periódica. Si una herramienta queda obsoleta o aparece una mejor alternativa, te lo comunicamos y gestionamos la transición.
        - generic [ref=e195]:
          - heading "¿Tengo que cambiar el software que ya uso en mi empresa?" [level=3] [ref=e196]
          - paragraph [ref=e197]: "No necesariamente. Integramos las soluciones de IA con las herramientas que ya tenéis: ERP, CRM, email, Google Workspace, etc. El objetivo es añadir automatización por encima de lo que ya funciona, no reemplazar todo."
        - generic [ref=e198]:
          - heading "¿Cuándo se nota el retorno de la inversión?" [level=3] [ref=e199]
          - paragraph [ref=e200]: Depende de la solución. Un flujo de automatización de facturas o emails suele amortizarse en el primer mes. Soluciones más completas como gestores documentales o chatbots integrados con ERP, en 2-4 meses. En la propuesta siempre incluimos una estimación de ahorro mensual.
        - generic [ref=e201]:
          - heading "¿La consultoría incluye formación para mi equipo?" [level=3] [ref=e202]
          - paragraph [ref=e203]: Sí, siempre. No entregamos una herramienta y desaparecemos. Formamos a las personas que la van a usar con sesiones prácticas adaptadas a su nivel, guías de uso y soporte durante el periodo de adaptación.
