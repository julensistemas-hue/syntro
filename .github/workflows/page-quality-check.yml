name: 🤖 SEO/GEO Auto-fix

on:
  push:
    branches: [main]
    paths:
      - 'src/pages/**/*.astro'

# Necesario para que el bot pueda commitear las mejoras
permissions:
  contents: write

jobs:
  autofix:
    name: Detectar y auto-mejorar SEO/GEO
    runs-on: ubuntu-latest
    # No re-disparar en los commits del propio bot
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'seo-bot')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detectar páginas modificadas
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'src/pages/' 2>/dev/null \
            | grep '\.astro$' \
            | grep -v '/api/' \
            | grep -v '/_' \
            || true)
          echo "Páginas detectadas:"
          echo "${CHANGED:-ninguna}"
          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Nada que analizar → salir
        if: steps.changed.outputs.files == ''
        run: echo "No hay páginas .astro modificadas fuera de /api/ — saliendo."

      - name: Analizar y auto-mejorar (IA + deterministas)
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: julen.sistemas@gmail.com
        run: node .github/scripts/seo-autofix.cjs
