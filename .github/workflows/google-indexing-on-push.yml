name: Google Indexing — Notificar páginas modificadas

on:
  push:
    branches: [main]
    paths:
      - 'src/pages/**/*.astro'

jobs:
  notify-indexing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar googleapis
        run: npm install googleapis --no-save

      - name: Detectar páginas cambiadas
        id: detect
        run: |
          BASE_URL="https://aisecurity.es"
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'src/pages/**/*.astro' 2>/dev/null || \
                    git show --name-only --format="" HEAD | grep '^src/pages/.*\.astro$')
          URLS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "$file" | grep -qE '^src/pages/(api|aula|_)' && continue
            slug=$(echo "$file" | sed 's|^src/pages/||;s|\.astro$||;s|/index$||;s|^index$||')
            [ -z "$slug" ] && url="${BASE_URL}/" || url="${BASE_URL}/${slug}"
            echo "  → $url"
            URLS="$URLS,$url"
          done <<< "$CHANGED"
          URLS="${URLS#,}"
          [ -z "$URLS" ] && echo "no_urls=true" >> $GITHUB_OUTPUT || { echo "urls=$URLS" >> $GITHUB_OUTPUT; echo "no_urls=false" >> $GITHUB_OUTPUT; }

      - name: Enviar sitemap vía GSC API
        if: steps.detect.outputs.no_urls != 'true'
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          node -e "
          const { google } = require('googleapis');
          const creds = JSON.parse(Buffer.from(process.env.GOOGLE_CREDENTIALS_JSON, 'base64').toString());
          const auth = new google.auth.GoogleAuth({ credentials: creds, scopes: ['https://www.googleapis.com/auth/webmasters'] });
          auth.getClient().then(async client => {
            const sc = google.searchconsole({ version: 'v1', auth: client });
            await sc.sitemaps.submit({ siteUrl: 'sc-domain:aisecurity.es', feedpath: 'https://aisecurity.es/sitemap-index.xml' });
            console.log('✅ Sitemap enviado a Google Search Console');
          }).catch(e => { console.error('❌', e.message); process.exit(1); });
          "

      - name: Bing sitemap ping
        if: steps.detect.outputs.no_urls != 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://www.bing.com/ping?sitemap=https://aisecurity.es/sitemap-index.xml")
          echo "Bing ping: $STATUS"

      - name: Resumen
        if: steps.detect.outputs.no_urls != 'true'
        run: |
          echo "### Indexación notificada ✅" >> $GITHUB_STEP_SUMMARY
          echo "**GSC API sitemap submit + Bing ping**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          IFS=',' read -ra URLS <<< "${{ steps.detect.outputs.urls }}"
          for url in "${URLS[@]}"; do echo "- $url" >> $GITHUB_STEP_SUMMARY; done
